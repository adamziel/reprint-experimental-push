$schema: https://raw.githubusercontent.com/ComposioHQ/agent-orchestrator/main/schema/config.schema.json

port: 8080
terminalPort: 14800
directTerminalPort: 14801
readyThresholdMs: 300000

observability:
  logLevel: info
  stderr: false

defaults:
  runtime: tmux
  agent: codex
  workspace: worktree
  notifiers:
    - dashboard
  orchestrator:
    agent: codex
  worker:
    agent: codex

projects:
  reprint-push:
    name: Reprint Push
    repo: adamziel/reprint-experimental-push
    path: /tmp/reprint-evidence-integration-20260527
    defaultBranch: lane/evidence-integration-20260527
    sessionPrefix: rpp
    runtime: tmux
    agent: codex
    workspace: worktree
    agentConfig:
      model: gpt-5.5
      permissions: permissionless
    orchestratorSessionStrategy: kill-previous
    agentRules: |
      Work on the Reprint push implementation only.
      Never use ngrok, cloudflared tunnels, localtunnel, serveo, localhost.run,
      lhr.life, Tailscale Funnel, or any other remote tunnel. The only exposed
      sandbox HTTP port is 8080; use loopback ports internally.
      Keep work in your AO-created worktree and branch. Do not revert changes
      made by other workers.
      Use the checklist in docs/reprint-push-completion-checklist.md. Claim the
      earliest relevant unchecked RPP items in your final report and implement
      real evidence toward them.
      Prefer general solutions and generated coverage over exact-shaped
      fixtures. Add tests or verifier output for every behavioral claim.
      Use tiered validation: every integrated slice gets per-slice focused
      checks; run adjacent or representative small-batch checks every 5-10
      integrated slices per domain or immediately for shared
      harness/planner/executor/generator/release/redaction code; run full
      diagnostics every 25-50 integrated slices, before any release status
      movement, after shared-core failure fixes, and before declaring a tranche
      complete. Commit coherent progress and push your branch.
      Do not mention Codex or generated-by attribution in branch names, PR
      titles, PR descriptions, review comments, or status comments.
      Maintain a bounded live team: five numeric developer workers is the hard
      maximum. If a developer finishes or exits and fewer than five numeric
      workers remain, spawn the next worker from the earliest useful unchecked
      RPP item.
      In this sandbox build, AO lifecycle/status helper commands can hang:
      avoid ao acknowledge, ao report, ao status, ao session, and ao send for
      worker activity. Supervise with tmux list-sessions, tmux capture-pane, ps,
      git worktree list, and bounded ao spawn commands instead.
      Keep panes stdout-auditable. Before long commands, print a one-line lane,
      intent, and command marker. Do not leave workers idle at prompts while
      release work remains.
      Do not use long sleep-based monitoring loops. If the team is busy,
      inspect panes, review lane outputs, critique, report progress, or prepare
      the next bounded worker task.
      Do not commit AO runtime scratch directories such as .ao/ or
      .lane-output/.

notifiers:
  dashboard:
    plugin: dashboard
    limit: 100
